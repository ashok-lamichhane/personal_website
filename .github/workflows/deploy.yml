name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

# Give permissions
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Debug - Check if secret exists
        run: |
          if [ -n "${{ secrets.GOOGLE_API_KEY }}" ]; then
            echo "✅ GOOGLE_API_KEY secret is set"
            echo "Key length: ${#{{ secrets.GOOGLE_API_KEY }}}"
          else
            echo "❌ GOOGLE_API_KEY secret is NOT set"
            exit 1
          fi
      
      - name: Replace API Key in index.html
        run: |
          # Debug: Check if placeholder exists
          if grep -q '${GOOGLE_API_KEY}' index.html; then
            echo "✅ Placeholder found in index.html"
          else
            echo "❌ Placeholder NOT found in index.html"
            echo "Current content of index.html:"
            cat index.html | grep -A2 -B2 "GOOGLE_API" || echo "No GOOGLE_API found"
            exit 1
          fi
          
          # Replace the placeholder
          sed -i "s/\${GOOGLE_API_KEY}/${{ secrets.GOOGLE_API_KEY }}/g" index.html
          
          # Debug: Check if replacement worked
          if grep -q '${{ secrets.GOOGLE_API_KEY }}' index.html; then
            echo "❌ Replacement failed - placeholder still present"
          else
            echo "✅ Replacement successful"
          fi
      
      - name: Debug - Check replaced content
        run: |
          echo "Checking if API key was injected:"
          if grep -q 'AIza' index.html; then
            echo "✅ API key (AIza) found in index.html"
          else
            echo "⚠️ API key not found in index.html"
          fi
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy with Google Gemini API key'
