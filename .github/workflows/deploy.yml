name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Add these permission settings
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Replace API Key in HTML
        run: |
          # Replace the placeholder with actual API key from secrets
          sed -i "s/\${DEEPSEEK_API_KEY}/${{ secrets.DEEPSEEK_API_KEY }}/g" index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          # Add these options
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
