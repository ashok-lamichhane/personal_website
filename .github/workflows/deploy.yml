name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

# Give permissions to the workflow
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Inject Google API Key
        run: |
          # Debug: Check if placeholder exists
          echo "Checking for placeholder in index.html..."
          if grep -q '\${GOOGLE_API_KEY}' index.html; then
            echo "✅ Placeholder found!"
          else
            echo "❌ Placeholder NOT found!"
            exit 1
          fi
          
          # Replace the placeholder with actual API key
          sed -i "s/\${GOOGLE_API_KEY}/${{ secrets.GOOGLE_API_KEY }}/g" index.html
          
          # Verify injection
          if grep -q '${{ secrets.GOOGLE_API_KEY }}' index.html; then
            echo "❌ Replacement failed!"
            exit 1
          else
            echo "✅ API key injected successfully!"
          fi
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy with Google Gemini API key'
