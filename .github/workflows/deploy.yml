name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Create api-config.js with API key
        run: |
          echo "// Auto-generated by GitHub Actions - DO NOT EDIT" > api-config.js
          echo "window.GOOGLE_API_KEY = '${{ secrets.GOOGLE_API_KEY }}';" >> api-config.js
          echo "✅ api-config.js created successfully"
      
      - name: Verify file was created
        run: |
          if [ -f "api-config.js" ]; then
            echo "✅ api-config.js exists"
            echo "File content:"
            cat api-config.js
          else
            echo "❌ api-config.js not created"
            exit 1
          fi
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy with secure API key'
